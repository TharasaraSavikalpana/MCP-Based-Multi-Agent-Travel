services:
  - type: web
    name: tripweaver-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: tripweaver-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python frontend.py
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKEND_URL
        fromService:
          type: web
          name: tripweaver-api
          property: host
